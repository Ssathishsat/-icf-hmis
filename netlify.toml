[build]
  base    = "frontend"
  publish = "dist"
  command = "npm ci && npm run build"

[build.environment]
  NODE_VERSION = "18"

# Proxy /api calls to the Render backend
[[redirects]]
  from   = "/api/*"
  to     = "https://icf-hmis-tlm6.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
